name: Stale Issues

on:
  schedule:
    - cron: "0 8 * * 1"

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: "This issue has been inactive for 30 days. Marking as stale."
          days-before-stale: 30
          days-before-close: 14
