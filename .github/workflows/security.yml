name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: "Secret Scanning (Gitleaks)"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | tar xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --no-git --verbose \
            --report-format json --report-path gitleaks-report.json || true
          cat gitleaks-report.json 2>/dev/null | head -50 || echo "No secrets found"

  trivy:
    name: "Vulnerability Scan (Trivy)"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - name: Run Trivy on dashboard
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: dashboard
          exit-code: 0

      - name: Run Trivy on esp firmware
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: esp
          exit-code: 0
